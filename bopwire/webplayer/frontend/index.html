<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bopwire — Discover</title>
  <meta name="description" content="Discover and stream independent artists on the Bopwire P2P network." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link rel="preconnect" href="https://api.bopwire.com" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ───────────────────────── Header ───────────────────────── -->
  <header class="topbar">
    <div class="brand">
      <img class="brand-mark" src="logo.png" alt="Bopwire" width="30" height="30" />
      <span class="brand-name">bopwire</span>
    </div>

    <nav class="viewnav" id="viewnav" role="tablist" aria-label="View">
      <button class="vn-btn" data-view="home"   role="tab" aria-selected="true">
        <span class="vn-ico">◆</span> Home
      </button>
      <button class="vn-btn" data-view="browse" role="tab" aria-selected="false">
        <span class="vn-ico">≣</span> Browse
      </button>
    </nav>

    <div class="search">
      <span class="search-ico">⌕</span>
      <input id="search" type="search" placeholder="Search songs, artists, albums…"
             autocomplete="off" spellcheck="false" />
    </div>

    <div class="status" id="status" title="Network status">
      <span class="dot" id="status-dot"></span>
      <span class="status-text" id="status-text">connecting…</span>
    </div>

    <a class="dmca-link" href="dmca.html" title="Copyright takedown request (DMCA)">DMCA</a>
  </header>

  <!-- ─────────────────────────── Views ──────────────────────── -->
  <main class="views" id="views">

    <!-- Home: hero + genre tiles + carousels -->
    <section class="view view-home" id="home">
      <div class="home-scroll" id="home-scroll">
        <div id="hero"></div>
        <div id="genre-tiles"></div>
        <div id="rows"></div>
        <div class="empty big" id="home-empty" hidden>Loading the network’s picks…</div>
        <div class="verify-line" id="verify-line" hidden></div>
      </div>
    </section>

    <!-- Browse: facet drill (chips over tracks) -->
    <section class="view view-browse" id="browse" hidden>
      <div class="controls">
        <div class="segmented" id="mode-toggle" role="tablist" aria-label="Browse mode">
          <button class="seg" data-mode="artist" role="tab" aria-selected="true">
            <span class="seg-ico">👤</span> Artist
          </button>
          <button class="seg" data-mode="genre" role="tab" aria-selected="false">
            <span class="seg-ico">🏷</span> Genre
          </button>
        </div>
        <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
      </div>

      <div class="panes" id="panes">
        <div class="pane pane-chips" id="chip-pane">
          <div class="chips" id="chips"></div>
          <div class="empty" id="chips-empty" hidden>No streamable songs right now.</div>
        </div>
        <div class="divider" id="divider" title="Drag to resize"></div>
        <div class="pane pane-tracks" id="track-pane">
          <div class="track-head" id="track-head" hidden></div>
          <div class="tracks" id="tracks"></div>
          <div class="empty" id="track-empty">Pick an album to see its tracks.</div>
        </div>
      </div>
    </section>

    <!-- List: "See all" for a collection / search results -->
    <section class="view view-list" id="list" hidden>
      <div class="list-scroll">
        <div class="list-head" id="list-head"></div>
        <div class="tracks" id="list-tracks"></div>
        <div class="empty" id="list-empty" hidden>Nothing here.</div>
      </div>
    </section>
  </main>

  <!-- ─────────────────────── Now playing ────────────────────── -->
  <div class="nowplaying" id="nowplaying" hidden>
    <div class="np-art" id="np-art">♪</div>
    <div class="np-meta">
      <div class="np-title" id="np-title">—</div>
      <div class="np-artist" id="np-artist">—</div>
    </div>
    <div class="np-controls">
      <button id="np-prev" class="np-btn np-side" aria-label="Previous">⏮</button>
      <button id="np-toggle" class="np-btn" aria-label="Play/Pause">▶</button>
      <button id="np-next" class="np-btn np-side" aria-label="Next">⏭</button>
      <div class="np-seek">
        <span id="np-cur">0:00</span>
        <input id="np-bar" type="range" min="0" max="1000" value="0" step="1" />
        <span id="np-dur">0:00</span>
      </div>
    </div>
    <div class="np-spin" id="np-spin" hidden></div>
    <audio id="audio" preload="none"></audio>
  </div>

  <!-- ───────────────────── Earn-crypto CTA ──────────────────── -->
  <footer class="cta">
    <span class="cta-text">
      Want to earn crypto listening to artists with less than 10,000 plays?
    </span>
    <span class="cta-menu">
      <button id="cta-link" class="cta-click" aria-haspopup="true" aria-expanded="false">
        Click here
      </button>
      <div class="cta-dropdown" id="cta-dropdown" role="menu" hidden>
        <img class="cta-logo" src="logo.png" alt="Bopwire app" width="72" height="72" />
        <div class="cta-dd-title">Get the Bopwire app</div>
        <a class="cta-opt" data-os="windows" href="#" role="menuitem"><span>🪟</span> Windows Installer</a>
        <a class="cta-opt" data-os="android" href="#" role="menuitem"><span>🤖</span> Android APK</a>
        <a class="cta-opt" data-os="linux"   href="#" role="menuitem"><span>🐧</span> Linux AppImage</a>
      </div>
    </span>
  </footer>

  <div class="toast" id="toast" hidden></div>

  <!-- prebuilt WASM audio decoders (mp3 / flac / ogg-vorbis), wasm embedded -->
  <script src="decoders/mpg123-decoder.min.js"></script>
  <script src="decoders/flac-decoder.min.js"></script>
  <script src="decoders/ogg-vorbis-decoder.min.js"></script>
  <script src="wasm-player.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
